<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info</title>
    <link rel="stylesheet" href="./css/Info.css">
    <script src="./js/InfoScript.js" defer></script>
</head>

<body>
    <a href="index.html">
        <button id="backButton">Back to Menu</button>
    </a>

    <main class="InfoPage">
        <h1>How to Play</h1>

        <hr> 

        <div class="InfoLayout">

            <aside class="SideButtons">
                <button class="info-btn active" data-info="controls">Controls</button>
                <button class="info-btn" data-info="events">Events</button>
                <button class="info-btn" data-info="stats">Stats</button>
                <button class="info-btn" data-info="conditions">Win / Lose</button>
            </aside>

            <section class="InfoCard">
                <h2 id="InfoTitle">Controls</h2>
                <div id="InfoContent">
                    <p>
                        Hold <b>D</b> or the <b>Right Arrow</b> key to drive forward.
                        Release the key to stop driving.
                    </p>
                    <p>
                        <b>Click</b> the event icon when it appears to open a random event.
                    </p>
                    <p>
                       Use your mouse to choose options during events.
                    </p>
                    <p>
                       Press <b>ESC</b> key to pause the game.
                    </p>
                </div>
            </section>

        </div>
    </main>
</body>
</html>
