<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel = "stylesheet" href = "css/GalleryStyleSheet.css">
    <script defer src = "js/GalleryScript.js"></script>
</head>
<body>
        <a href = "index.html">        
            <button id = "backButton">Back to Menu</button>
        </a>

        <div class = "container">
            <h1>Endings</h1>
            <hr>

            <div class = "EndingsContainer">
                <div id = "endingA">
                    <img src = "./images/GameWin.png" alt = "Game Win">
                    <p>Ending A: Reach Destination</p>
                </div>

                <div id = "endingB">
                    <img src = "./images/GameOverStamina.png" alt = "Game Over Stamina">
                    <p>Ending B: Run Out of Stamina</p>
                </div>

                <div id = "endingC">
                    <img src = "./images/GameOverMoney.png" alt = "Game Over Money">
                    <p>Ending C: Run Out of Money</p>
                </div>

                <div id = "endingD">
                    <img src = "./images/GameOverMorale.png" alt = "Game Over Morale">
                    <p>Ending D: Lose Morale</p>
                </div>

                <div id = "endingE">
                    <img src = "./images/GameOverTension.png" alt = "Game Over Tension">
                    <p>Ending E: Exceed Tension Limit</p>
                </div>

                <div id = "endingF">
                    <img src = "./images/GameOverFuel.png" alt = "Game Over Fuel">
                    <p>Ending F: Run Out of Fuel</p>
                </div>
            </div>
        </div>
</body>
</html>
